<!-- FILE: src/adeu/templates/viewer.html -->
<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="color-scheme" content="light dark">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600&family=Lora:ital,wght@0,600;1,600&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --brand-sand: #e8c0a1;
            --brand-sand-light: #f2d9c7;
            --brand-sand-dark: #d4a882;
            --brand-mint: #e6f3f0;
            --brand-mint-dark: #c9e4de;
            --brand-navy: #1a2a2c;
            --brand-navy-light: #2a3a3c;
            --brand-mauve: #dacad2;

            --neutral-50: #fafafa;
            --neutral-100: #f5f5f5;
            --neutral-200: #e5e5e5;
            --neutral-300: #d9d9d9;
            --neutral-600: #555969;
            --neutral-800: #1e2028;
            --neutral-900: #171717;

            --font-lora: 'Lora', Georgia, serif;
            --font-jost: 'Jost', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;

            --bg-body: var(--neutral-50);
            --bg-card: #ffffff;
            --border-card: var(--neutral-200);
            --text-main: var(--neutral-600);
            --text-heading: var(--brand-navy);
            --bg-blockquote: rgba(232, 192, 161, 0.15);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-body: var(--neutral-900);
                --bg-card: var(--brand-navy);
                --border-card: var(--brand-navy-light);
                --text-main: rgba(255, 255, 255, 0.85);
                --text-heading: #ffffff;
                --bg-blockquote: rgba(232, 192, 161, 0.1);
                --neutral-100: var(--brand-navy-light);
            }
        }

        /* --- Strict Layout Constraints for MCP Iframe --- */
        html,
        body {
            margin: 0;
            padding: 0;
            overflow: hidden !important;
            /* CRITICAL: Kills external scrollbar */
            box-sizing: border-box;
            background-color: transparent;
            height: 100%;
        }

        body {
            font-family: var(--font-jost);
            color: var(--text-main);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            padding: 16px;
            /* Body padding acts as outer margin for the card */
            display: flex;
            flex-direction: column;
        }

        .adeu-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-card);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            max-height: 100%;
            /* Prevents card from exceeding body height */
        }

        /* --- Nav / Logo --- */
        .navbar {
            flex-shrink: 0;
            /* Prevents navbar from shrinking */
            background-color: var(--bg-card);
            padding: 16px 32px;
            border-bottom: 1px solid var(--border-card);
            display: flex;
            align-items: center;
        }

        .logo-container {
            display: flex;
            align-items: center;
        }

        .logo-container svg {
            max-width: 80px;
            height: auto;
        }

        .logo-container svg path,
        .logo-container svg rect,
        .logo-container svg polygon,
        .logo-container svg circle {
            transition: fill 0.2s ease;
        }

        @media (prefers-color-scheme: dark) {

            .logo-container svg path,
            .logo-container svg rect,
            .logo-container svg polygon,
            .logo-container svg circle,
            .logo-container svg {
                fill: #ffffff !important;
            }
        }

        /* --- Content Container (Scrollable Area) --- */
        .content-wrapper {
            position: relative;
            flex: 1 1 auto;
            /* Allows wrapper to fill remaining space */
            min-height: 0;
            /* CRITICAL: Allows Flex children to trigger internal overflow */
        }

        /* Subtle scrollbar for expanded area */
        .content-wrapper::-webkit-scrollbar {
            width: 6px;
        }

        .content-wrapper::-webkit-scrollbar-track {
            background: transparent;
        }

        .content-wrapper::-webkit-scrollbar-thumb {
            background-color: var(--border-card);
            border-radius: 4px;
        }

        #app {
            padding: 32px;
            display: flow-root;
        }

        .fade-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0), var(--bg-card));
            pointer-events: none;
            display: none;
        }

        @media (prefers-color-scheme: dark) {
            .fade-overlay {
                background: linear-gradient(to bottom, rgba(26, 42, 44, 0), var(--bg-card));
            }
        }

        /* --- Toggle Controls --- */
        .toggle-container {
            flex-shrink: 0;
            /* Prevents toggle button from shrinking */
            display: none;
            /* Controlled via JS */
            justify-content: center;
            align-items: center;
            padding: 12px;
            border-top: 1px solid var(--border-card);
            background-color: var(--bg-card);
        }

        #toggle-btn {
            background: transparent;
            border: none;
            color: var(--brand-sand-dark);
            font-family: var(--font-jost);
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        #toggle-btn:hover {
            color: var(--text-heading);
            background: var(--neutral-100);
        }

        @media (prefers-color-scheme: dark) {
            #toggle-btn:hover {
                background: var(--brand-navy-light);
            }
        }

        #toggle-icon {
            transition: transform 0.3s ease;
        }

        /* --- Typography Defaults --- */
        h1,
        h2,
        h3,
        h4 {
            font-family: var(--font-lora);
            color: var(--text-heading);
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-top: 1.5em;
            margin-bottom: 0.5em;
        }

        h1 {
            font-size: 2.25rem;
            border-bottom: 1px solid var(--border-card);
            padding-bottom: 0.3em;
            margin-top: 0;
        }

        h2 {
            font-size: 1.75rem;
        }

        h3 {
            font-size: 1.25rem;
        }

        a {
            color: var(--brand-sand-dark);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border 0.2s ease;
        }

        a:hover {
            border-bottom-color: var(--brand-sand-dark);
        }

        strong {
            font-weight: 600;
            color: var(--text-heading);
        }

        ul,
        ol {
            padding-left: 1.5rem;
            margin-bottom: 1rem;
        }

        li {
            margin-bottom: 0.5rem;
        }

        blockquote {
            border-left: 4px solid var(--brand-sand);
            padding: 12px 20px;
            margin: 24px 0;
            color: var(--text-main);
            background: var(--bg-blockquote);
            border-radius: 0 8px 8px 0;
            font-style: italic;
        }

        code {
            font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 0.85em;
            background: var(--neutral-100);
            color: var(--brand-sand-dark);
            padding: 0.2em 0.4em;
            border-radius: 4px;
        }

        pre code {
            display: block;
            padding: 16px;
            background: var(--neutral-900);
            color: #e5e5e5;
            border-radius: 8px;
            overflow-x: auto;
        }

        .skeleton {
            background: linear-gradient(90deg, var(--neutral-100) 25%, var(--border-card) 50%, var(--neutral-100) 75%);
            background-size: 200% 100%;
            animation: skeleton 1.5s ease-in-out infinite;
            border-radius: 4px;
        }

        @keyframes skeleton {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        .alert {
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background-color: #fef2f2;
            border: 1px solid #fecaca;
            color: #991b1b;
        }

        @media (prefers-color-scheme: dark) {
            .alert {
                background-color: rgba(127, 29, 29, 0.2);
                border-color: rgba(248, 113, 113, 0.3);
                color: #fca5a5;
            }
        }

        .alert-title {
            font-weight: 600;
            font-size: 1.1em;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: var(--font-lora);
        }

        .alert-body {
            margin: 0;
            font-size: 0.95em;
        }

        .alert-details {
            background: rgba(0, 0, 0, 0.05);
            padding: 12px;
            border-radius: 6px;
            font-family: ui-monospace, Consolas, monospace;
            font-size: 0.85em;
            white-space: pre-wrap;
            word-break: break-all;
            margin-top: 8px;
            border: 1px solid rgba(0, 0, 0, 0.1);
        }
    </style>
    <script id="marked-script">[[marked_js_code | safe]]</script>
</head>

<body>
    <div class="adeu-card">
        <!-- Nav / Logo (Sticky via Flexbox) -->
        <nav class="navbar">
            <div class="logo-container">
                [[ adeu_svg_code ]]
            </div>
        </nav>

        <!-- Main Content -->
        <div class="content-wrapper" id="content-wrapper">
            <div id="app">
                <div class="skeleton" style="height: 36px; width: 40%; margin-bottom: 24px;"></div>
                <div class="skeleton" style="height: 16px; width: 100%; margin-bottom: 12px;"></div>
                <div class="skeleton" style="height: 16px; width: 95%; margin-bottom: 12px;"></div>
                <div class="skeleton" style="height: 16px; width: 90%; margin-bottom: 24px;"></div>
                <div class="skeleton" style="height: 16px; width: 80%; margin-bottom: 12px;"></div>
            </div>
            <!-- Overlay Fade -->
            <div class="fade-overlay" id="fade-overlay"></div>
        </div>

        <!-- Toggle Controls -->
        <div class="toggle-container" id="toggle-container">
            <button id="toggle-btn">
                <span id="toggle-text">Show More</span>
                <svg id="toggle-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
            </button>
        </div>
    </div>

    <script>
        const appDiv = document.getElementById('app');
        const INIT_ID = 1;
        let isExpanded = false;

        function escapeHtml(unsafe) {
            return (unsafe || "").toString()
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function showError(title, message, details = null) {
            let html = `
            <div class="alert">
                <div class="alert-title">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                    ${escapeHtml(title)}
                </div>
                <div class="alert-body">${escapeHtml(message)}</div>
        `;
            if (details) {
                html += `<div class="alert-details">${escapeHtml(details)}</div>`;
            }
            html += `</div>`;
            appDiv.innerHTML = html;
        }

        function checkCollapsible() {
            const wrapper = document.getElementById('content-wrapper');
            const toggleContainer = document.getElementById('toggle-container');
            const fadeOverlay = document.getElementById('fade-overlay');
            const toggleIcon = document.getElementById('toggle-icon');
            const toggleText = document.getElementById('toggle-text');

            // Measure the unconstrained text content directly
            const realHeight = appDiv.scrollHeight;

            const COLLAPSE_THRESHOLD = 200;
            const COLLAPSED_HEIGHT = 120;

            if (realHeight > COLLAPSE_THRESHOLD) {
                toggleContainer.style.display = 'flex';
                if (!isExpanded) {
                    wrapper.style.maxHeight = COLLAPSED_HEIGHT + 'px';
                    wrapper.style.overflowY = 'hidden';
                    fadeOverlay.style.display = 'block';
                    toggleIcon.style.transform = 'rotate(0deg)';
                    toggleText.textContent = 'Show More';
                } else {
                    wrapper.style.maxHeight = 'none';
                    wrapper.style.overflowY = 'auto';
                    fadeOverlay.style.display = 'none';
                    toggleIcon.style.transform = 'rotate(180deg)';
                    toggleText.textContent = 'Show Less';
                }
            } else {
                toggleContainer.style.display = 'none';
                wrapper.style.maxHeight = 'none';
                wrapper.style.overflowY = 'visible';
                fadeOverlay.style.display = 'none';
            }

            triggerResize();
        }

        document.getElementById('toggle-btn').addEventListener('click', () => {
            isExpanded = !isExpanded;
            checkCollapsible();
        });

        function triggerResize() {
            const nav = document.querySelector('.navbar');
            const wrapper = document.getElementById('content-wrapper');
            const toggle = document.getElementById('toggle-container');

            let requestedHeight;

            // 32px is body padding (16px top + 16px bottom).
            // 2px is adeu-card border (1px top + 1px bottom).
            const containerChrome = 34;

            if (!isExpanded) {
                // When collapsed, calculate exact visual height
                const toggleHeight = toggle.style.display === 'none' ? 0 : toggle.offsetHeight;
                requestedHeight = nav.offsetHeight + wrapper.offsetHeight + toggleHeight + containerChrome;
            } else {
                // When expanded, calculate based on the full unconstrained text size
                const desiredHeight = nav.offsetHeight + appDiv.scrollHeight + toggle.offsetHeight + containerChrome;

                // Hard cap at 600px so it fits nicely inside Claude Desktop without triggering external scrolling
                requestedHeight = Math.min(desiredHeight, 600);
            }

            window.parent.postMessage({
                jsonrpc: "2.0",
                method: "ui/notifications/size-changed",
                params: { height: Math.ceil(requestedHeight), width: 600 }
            }, "*");
        }

        window.addEventListener("message", (event) => {
            try {
                if (!event.data || event.data.jsonrpc !== "2.0") return;
                const msg = event.data;

                if (msg.id === INIT_ID) {
                    window.parent.postMessage({
                        jsonrpc: "2.0",
                        method: "ui/notifications/initialized",
                        params: {}
                    }, "*");
                    return;
                }

                if (msg.method === "ui/notifications/tool-result") {
                    if (window.__MARKED_ERROR || typeof marked === 'undefined') {
                        showError("Missing Dependency", "The Markdown renderer failed to load.", window.__MARKED_ERROR || "marked is undefined.");
                        return;
                    }

                    const result = msg.params;
                    if (!result) {
                        showError("Empty Response", "The server returned an empty payload.");
                        return;
                    }

                    if (result.structuredContent && result.structuredContent.markdown) {
                        appDiv.innerHTML = marked.parse(result.structuredContent.markdown);
                    } else if (result.content) {
                        if (Array.isArray(result.content)) {
                            const txt = result.content.find(c => c.type === 'text');
                            if (txt) appDiv.textContent = txt.text;
                        } else if (typeof result.content === 'string') {
                            appDiv.textContent = result.content;
                        } else {
                            showError("Unsupported Format", "Unrecognizable content format.", JSON.stringify(result.content));
                        }
                    } else {
                        showError("No Content", "No structured content or raw text found.", JSON.stringify(result));
                    }
                }
            } catch (error) {
                showError("Rendering Engine Error", "An unexpected error occurred.", error.toString() + "\n" + error.stack);
            }
        });

        const observer = new ResizeObserver(() => {
            checkCollapsible();
        });
        observer.observe(appDiv);

        window.parent.postMessage({
            jsonrpc: "2.0",
            id: INIT_ID,
            method: "ui/initialize",
            params: {
                appInfo: { name: "Adeu Viewer", version: "1.0.0" },
                appCapabilities: {},
                protocolVersion: "2025-11-21"
            }
        }, "*");
    </script>
</body>

</html>
