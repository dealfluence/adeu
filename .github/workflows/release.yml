name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  pypi-publish:
    if: github.repository == 'dealfluence/adeu'
    name: Upload release to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/adeu
    permissions:
      id-token: write  # IMPORTANT: Mandatory for trusted publishing
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "python/uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install Dependencies
        working-directory: ./python
        run: uv sync

      - name: Build package
        working-directory: ./python
        run: uv build

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  npm-and-github-release:
    if: github.repository == 'dealfluence/adeu'
    name: Publish to NPM and GitHub Releases
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to upload release assets
      id-token: write  # Needed for NPM provenance

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        working-directory: ./node
        run: npm install

      - name: Build Packages
        working-directory: ./node
        run: npm run build

      - name: Publish to NPM
        working-directory: ./node
        run: npm publish --workspaces --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Pack MCPB Bundle
        working-directory: ./desktop-extension
        run: zip -r Adeu.mcpb index.js manifest.json icon.png package.json

      - name: Upload to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.ref_name }} ./desktop-extension/Adeu.mcpb